<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>하이버블즈 로고 다운로드</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #fffdf5 0%, #ffffff 100%);
        color: #111827;
      }
      .wrap {
        max-width: 960px;
        margin: 0 auto;
        padding: 40px 20px 80px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 32px;
        font-weight: 900;
        letter-spacing: -0.04em;
      }
      .sub {
        margin: 0 0 28px;
        color: #6b7280;
        font-size: 14px;
        line-height: 1.6;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 18px;
      }
      .card {
        background: white;
        border: 1px solid rgba(15, 23, 42, 0.06);
        border-radius: 24px;
        padding: 18px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }
      .preview {
        height: 160px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 18px;
        background-image:
          linear-gradient(45deg, #f3f4f6 25%, transparent 25%),
          linear-gradient(-45deg, #f3f4f6 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #f3f4f6 75%),
          linear-gradient(-45deg, transparent 75%, #f3f4f6 75%);
        background-size: 20px 20px;
        background-position: 0 0, 0 10px, 10px -10px, -10px 0;
      }
      .preview img {
        max-width: 100%;
        max-height: 140px;
        object-fit: contain;
      }
      .meta {
        margin-top: 14px;
      }
      .title-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .title {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.03em;
      }
      .badge {
        border-radius: 999px;
        background: #fef3c7;
        color: #b45309;
        font-size: 11px;
        font-weight: 800;
        padding: 3px 8px;
      }
      .desc {
        margin-top: 4px;
        color: #6b7280;
        font-size: 13px;
      }
      .actions {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }
      a.link {
        appearance: none;
        border: none;
        border-radius: 999px;
        padding: 11px 14px;
        font-weight: 800;
        font-size: 13px;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
        background: #f59e0b;
        color: white;
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>하이버블즈 로고 다운로드</h1>
      <p class="sub">회색 여백을 제거한 비눗방울 로고를 그대로 다운로드할 수 있게 준비했습니다.</p>

      <div class="grid">
        <div class="card">
          <div class="preview"><img src="/hi-bubble-icon.svg" alt="하이버블즈 앱 아이콘" /></div>
          <div class="meta">
            <div class="title-row"><div class="title">앱 아이콘</div><div class="badge">SVG</div></div>
            <div class="desc">회색 배경 없이 크롭된 비눗방울 아이콘</div>
          </div>
          <div class="actions">
            <a class="link" href="/hi-bubble-icon.svg" download="hi-bubble-icon.svg">다운로드</a>
          </div>
        </div>

        <div class="card">
          <div class="preview"><img src="/hi-bubble-wordmark.svg" alt="하이버블즈 워드마크" /></div>
          <div class="meta">
            <div class="title-row"><div class="title">워드마크</div><div class="badge">SVG</div></div>
            <div class="desc">텍스트 로고 원본 SVG</div>
          </div>
          <div class="actions">
            <a class="link" href="/hi-bubble-wordmark.svg" download="hi-bubble-wordmark.svg">다운로드</a>
          </div>
        </div>

        <div class="card">
          <div class="preview"><img src="/hi-bubble-logo.svg" alt="하이버블즈 조합 로고" /></div>
          <div class="meta">
            <div class="title-row"><div class="title">조합 로고</div><div class="badge">SVG</div></div>
            <div class="desc">크롭된 비눗방울 아이콘 + 워드마크 조합</div>
          </div>
          <div class="actions">
            <a class="link" href="/hi-bubble-logo.svg" download="hi-bubble-logo.svg">다운로드</a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
