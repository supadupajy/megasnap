<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>하이버블즈 로고 다운로드</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #fffdf5 0%, #ffffff 100%);
        color: #111827;
      }
      .wrap {
        max-width: 960px;
        margin: 0 auto;
        padding: 40px 20px 80px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 32px;
        font-weight: 900;
        letter-spacing: -0.04em;
      }
      .sub {
        margin: 0 0 28px;
        color: #6b7280;
        font-size: 14px;
        line-height: 1.6;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 18px;
      }
      .card {
        background: white;
        border: 1px solid rgba(15, 23, 42, 0.06);
        border-radius: 24px;
        padding: 18px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }
      .preview {
        height: 160px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 18px;
        background-image:
          linear-gradient(45deg, #f3f4f6 25%, transparent 25%),
          linear-gradient(-45deg, #f3f4f6 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #f3f4f6 75%),
          linear-gradient(-45deg, transparent 75%, #f3f4f6 75%);
        background-size: 20px 20px;
        background-position: 0 0, 0 10px, 10px -10px, -10px 0;
      }
      .preview img {
        max-width: 100%;
        max-height: 132px;
        object-fit: contain;
      }
      .preview-cropped {
        width: 128px;
        height: 128px;
        overflow: hidden;
        border-radius: 27%;
        background-image: url('/hi-bubble-icon.png');
        background-position: 50% 47%;
        background-repeat: no-repeat;
        background-size: 222% 222%;
      }
      .meta {
        margin-top: 14px;
      }
      .title-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .title {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.03em;
      }
      .badge {
        border-radius: 999px;
        background: #fef3c7;
        color: #b45309;
        font-size: 11px;
        font-weight: 800;
        padding: 3px 8px;
      }
      .desc {
        margin-top: 4px;
        color: #6b7280;
        font-size: 13px;
      }
      .actions {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }
      button.link,
      a.link {
        appearance: none;
        border: none;
        border-radius: 999px;
        padding: 11px 14px;
        font-weight: 800;
        font-size: 13px;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
        background: #f59e0b;
        color: white;
        flex: 1;
      }
      button.link:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>하이버블즈 로고 다운로드</h1>
      <p class="sub">앱 아이콘은 배경 없는 투명 PNG로 바로 다운로드할 수 있어요.</p>

      <div class="grid">
        <div class="card">
          <div class="preview">
            <div class="preview-cropped" aria-label="하이버블즈 앱 아이콘" role="img"></div>
          </div>
          <div class="meta">
            <div class="title-row"><div class="title">앱 아이콘</div><div class="badge">PNG</div></div>
            <div class="desc">배경 없는 투명 PNG로 받을 수 있는 앱 아이콘</div>
          </div>
          <div class="actions">
            <button class="link" id="transparent-png-download">배경 없는 PNG</button>
          </div>
        </div>

        <div class="card">
          <div class="preview"><img src="/hi-bubble-wordmark.svg" alt="하이버블즈 워드마크" /></div>
          <div class="meta">
            <div class="title-row"><div class="title">워드마크</div><div class="badge">SVG</div></div>
            <div class="desc">텍스트 로고 원본 SVG</div>
          </div>
          <div class="actions">
            <a class="link" href="/hi-bubble-wordmark.svg" download="hi-bubble-wordmark.svg">다운로드</a>
          </div>
        </div>

        <div class="card">
          <div class="preview"><img src="/hi-bubble-logo.svg" alt="하이버블즈 조합 로고" /></div>
          <div class="meta">
            <div class="title-row"><div class="title">조합 로고</div><div class="badge">SVG</div></div>
            <div class="desc">비눗방울 아이콘 + 워드마크 조합</div>
          </div>
          <div class="actions">
            <a class="link" href="/hi-bubble-logo.svg" download="hi-bubble-logo.svg">다운로드</a>
          </div>
        </div>
      </div>
    </div>

    <script>
      const ICON_EXPORT_SIZE = 1024;
      const ICON_SCALE = 2.22;
      const ICON_POSITION_X = 0.5;
      const ICON_POSITION_Y = 0.47;
      const ICON_RADIUS = 276;

      function createRoundedRectPath(ctx, size, radius) {
        ctx.beginPath();
        ctx.moveTo(radius, 0);
        ctx.lineTo(size - radius, 0);
        ctx.quadraticCurveTo(size, 0, size, radius);
        ctx.lineTo(size, size - radius);
        ctx.quadraticCurveTo(size, size, size - radius, size);
        ctx.lineTo(radius, size);
        ctx.quadraticCurveTo(0, size, 0, size - radius);
        ctx.lineTo(0, radius);
        ctx.quadraticCurveTo(0, 0, radius, 0);
        ctx.closePath();
      }

      async function downloadTransparentIconPng() {
        const button = document.getElementById('transparent-png-download');
        const originalLabel = button.textContent;
        button.disabled = true;
        button.textContent = '생성 중...';

        try {
          const image = await new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(img);
            img.onerror = reject;
            img.src = '/hi-bubble-icon.png';
          });

          const canvas = document.createElement('canvas');
          canvas.width = ICON_EXPORT_SIZE;
          canvas.height = ICON_EXPORT_SIZE;

          const ctx = canvas.getContext('2d');
          if (!ctx) throw new Error('Canvas context 생성 실패');

          ctx.clearRect(0, 0, ICON_EXPORT_SIZE, ICON_EXPORT_SIZE);
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = 'high';

          ctx.save();
          createRoundedRectPath(ctx, ICON_EXPORT_SIZE, ICON_RADIUS);
          ctx.clip();

          const drawSize = ICON_EXPORT_SIZE * ICON_SCALE;
          const dx = (ICON_EXPORT_SIZE - drawSize) * ICON_POSITION_X;
          const dy = (ICON_EXPORT_SIZE - drawSize) * ICON_POSITION_Y;
          ctx.drawImage(image, dx, dy, drawSize, drawSize);
          ctx.restore();

          const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
          if (!blob) throw new Error('PNG 생성 실패');

          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = 'hi-bubble-icon-transparent.png';
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);

          button.textContent = '완료';
          setTimeout(() => {
            button.textContent = originalLabel;
            button.disabled = false;
          }, 900);
        } catch (error) {
          console.error(error);
          alert('PNG 생성 중 문제가 발생했습니다. 잠시 후 다시 시도해주세요.');
          button.textContent = originalLabel;
          button.disabled = false;
        }
      }

      document.getElementById('transparent-png-download').addEventListener('click', downloadTransparentIconPng);
    </script>
  </body>
</html>
