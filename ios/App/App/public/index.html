    <style>
      @font-face {
        font-family: 'LINE Seed KR';
        font-display: block;
      }

      html, body, #root {
        width: 100%;
        margin: 0;
        padding: 0;
        background-color: white;
        font-family: 'LINE Seed KR', sans-serif;
      }

      body {
        visibility: hidden;
      }

      html.fonts-loaded body {
        visibility: visible;
      }

      .kakao-overlay { position: absolute; pointer-events: auto; }
    </style>
    <script>
      (function() {
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(function() {
            document.documentElement.classList.add('fonts-loaded');
          });
          // 최대 1초 후에는 강제로 표시 (폰트 로드 실패 대비)
          setTimeout(function() {
            document.documentElement.classList.add('fonts-loaded');
          }, 1000);
        } else {
          document.documentElement.classList.add('fonts-loaded');
        }
      })();
    </script>
