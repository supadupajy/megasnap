    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./hi-bubble-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no, interactive-widget=overlays-content" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>하이버블즈</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      [FIX] dynamic-subset 방식은 weight별 subset이 비동기로 따로 로드되어
      모바일에서 일부 글자만 볼드/일반으로 보이는 "볼드 혼재" 문제를 일으킴.
      → 모든 weight를 한 번에 로드하는 정적 CSS로 변경하고 font-display: swap 적용.
    -->
    <link rel="preload" href="https://cdn.jsdelivr.net/gh/fonts-archive/LINESeedKR/LINESeedKR.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/fonts-archive/LINESeedKR/LINESeedKR.css" /></noscript>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800;900&display=swap" rel="stylesheet" />
    <style>
      html, body, #root {
        width: 100%;
        margin: 0;
        padding: 0;
        background-color: white;
        font-family: 'LINE Seed KR', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
        /* [FIX] 모바일 WebKit/Blink가 폰트 두께를 임의로 굵게 합성(synthetic bold)하는 것 방지 */
        font-synthesis: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }

      /* [FIX] 폰트 로드 중 깜빡임/혼재 방지: 폰트가 로드될 때까지 텍스트 숨김 */
      html:not(.fonts-loaded) body {
        visibility: hidden;
      }

      html.fonts-loaded body {
        visibility: visible;
      }

      .kakao-overlay { position: absolute; pointer-events: auto; }
    </style>
    <script>
      (function() {
        var done = false;
        function markLoaded() {
          if (done) return;
          done = true;
          document.documentElement.classList.add('fonts-loaded');
        }

        if (document.fonts && document.fonts.load) {
          // [FIX] 사용하는 모든 weight를 명시적으로 load해서 일부 weight subset이
          // 늦게 로드되어 글자별로 볼드가 섞이는 현상 방지
          Promise.all([
            document.fonts.load('400 16px "LINE Seed KR"'),
            document.fonts.load('700 16px "LINE Seed KR"')
          ]).then(markLoaded).catch(markLoaded);

          // 최대 2초 후에는 강제로 표시 (네트워크 느린 환경 대비)
          setTimeout(markLoaded, 2000);
        } else {
          markLoaded();
        }
      })();
    </script>
    <script type="module" crossorigin src="./assets/index-BSS6n9xR.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/supabase-C_g5M0cc.js">

    <link rel="modulepreload" crossorigin href="./assets/framer-Cnrbc9I_.js">
    <link rel="stylesheet" crossorigin href="./assets/index-BhtKeHs5.css">
  </head>
