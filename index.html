<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MegaSnap - Kakao Map</title>
    <style>
      /* 지도 관련 기본 스타일 */
      #root { height: 100vh; }
    </style>
    <!-- Kakao Maps API - 발급받은 앱 키를 appkey 파라미터에 넣어야 합니다 -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_KAKAO_APP_KEY&libraries=services,clusterer,drawing"></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
