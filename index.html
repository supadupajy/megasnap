<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dyad-generated-app</title>
    <style>
      /* 구글 맵 개발용 워터마크 및 경고창 숨김 처리 */
      .gm-err-container { display: none !important; }
      .gm-err-modal { display: none !important; }
      .gm-style-cc { display: none !important; }
      a[href^="https://maps.google.com/maps/contrib"] { display: none !important; }
      a[href^="https://www.google.com/intl/ko-KR_US/help/terms_maps.html"] { display: none !important; }
      .gmnoprint { display: none !important; }
      
      /* 'Development purposes only' 오버레이 및 텍스트 숨김 */
      .gm-style > div:first-child > div:first-child > div:last-child > div {
        display: none !important;
      }
      .gm-style-pbc {
        display: none !important;
      }
    </style>
    <script>
      // 구글 맵 API 경고 팝업 자동 확인 스크립트
      (function() {
        const observer = new MutationObserver((mutations) => {
          for (const mutation of mutations) {
            for (const node of mutation.addedNodes) {
              if (node.nodeType === 1) {
                const buttons = node.querySelectorAll('button');
                for (const btn of buttons) {
                  if (btn.textContent === 'OK' || btn.textContent === '확인') {
                    btn.click();
                  }
                }
              }
            }
          }
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=&libraries=places"></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
